apiVersion: apps/v1
kind: StatefulSet
metadata:
  name: plugin-daemon
  namespace: dify-plus
  labels:
    app.kubernetes.io/name: plugin-daemon
    app.kubernetes.io/component: plugin
    app.kubernetes.io/part-of: dify-plus
spec:
  serviceName: plugin-daemon
  replicas: 1
  selector:
    matchLabels:
      app.kubernetes.io/name: plugin-daemon
      app.kubernetes.io/component: plugin
  template:
    metadata:
      labels:
        app.kubernetes.io/name: plugin-daemon
        app.kubernetes.io/component: plugin
        app.kubernetes.io/part-of: dify-plus
    spec:
      containers:
        - name: plugin-daemon
          securityContext:
            seccompProfile:
              type: Unconfined
          image: harbor.hkbluelans.com/dify/dify-plugin-daemon:0.5.2-local
          imagePullPolicy: IfNotPresent
          ports:
            - name: http
              containerPort: 5002
              protocol: TCP
            - name: debug
              containerPort: 5003
              protocol: TCP
          envFrom:
            - configMapRef:
                name: dify-plus-common-config
            - configMapRef:
                name: dify-plus-plugin-daemon-config
          env:
            - name: DB_PASSWORD
              valueFrom:
                secretKeyRef:
                  name: dify-plus-secrets
                  key: DB_PASSWORD
            - name: REDIS_PASSWORD
              valueFrom:
                secretKeyRef:
                  name: dify-plus-secrets
                  key: REDIS_PASSWORD
            - name: SERVER_KEY
              valueFrom:
                secretKeyRef:
                  name: dify-plus-secrets
                  key: PLUGIN_DAEMON_KEY
            - name: DIFY_INNER_API_KEY
              valueFrom:
                secretKeyRef:
                  name: dify-plus-secrets
                  key: PLUGIN_DIFY_INNER_API_KEY
            - name: DIFY_INNER_API_URL
              value: "http://api:5001"
            - name: PIP_INDEX_URL
              value: "https://pypi.tuna.tsinghua.edu.cn/simple"
          volumeMounts:
            - name: plugin-storage
              mountPath: /app/storage
          resources:
            requests:
              memory: "256Mi"
              cpu: "250m"
            limits:
              memory: "1Gi"
              cpu: "1000m"
  # 使用 volumeClaimTemplates 自动创建 Longhorn PVC
  volumeClaimTemplates:
    - metadata:
        name: plugin-storage
      spec:
        storageClassName: longhorn
        accessModes: ["ReadWriteOnce"]
        resources:
          requests:
            storage: 5Gi
