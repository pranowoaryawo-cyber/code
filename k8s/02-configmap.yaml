  namespace: dify-plus
data:
  # 域名配置 - 根据实际环境修改
  DIFY_DOMAIN: "difyplus.hkbluelans.com"
  DIFY_PROTOCOL: "http"
  
  # Next.js 客户端环境变量 (浏览器端可访问)
