apiVersion: apps/v1
kind: StatefulSet
metadata:
  name: redis
  namespace: dify-plus
  labels:
    app.kubernetes.io/name: redis
    app.kubernetes.io/component: cache
    app.kubernetes.io/part-of: dify-plus
spec:
  serviceName: redis
  replicas: 1
  selector:
    matchLabels:
      app.kubernetes.io/name: redis
      app.kubernetes.io/component: cache
  template:
    metadata:
      labels:
        app.kubernetes.io/name: redis
        app.kubernetes.io/component: cache
        app.kubernetes.io/part-of: dify-plus
    spec:
      containers:
        - name: redis
          image: harbor.hkbluelans.com/dify/redis:6-alpine
          imagePullPolicy: IfNotPresent
          ports:
            - name: redis
              containerPort: 6380
              protocol: TCP
          command:
            - redis-server
            - --port
            - "6380"
            - --requirepass
            - $(REDIS_PASSWORD)
            - --appendonly
            - "yes"
          env:
            - name: REDIS_PASSWORD
              valueFrom:
                secretKeyRef:
                  name: dify-plus-secrets
                  key: REDIS_PASSWORD
            - name: REDISCLI_AUTH
              valueFrom:
                configMapKeyRef:
                  name: dify-plus-redis-config
                  key: REDISCLI_AUTH
          volumeMounts:
            - name: redis-data
              mountPath: /data
          livenessProbe:
            exec:
              command:
                - sh
                - -c
                - "redis-cli -h 127.0.0.1 -p 6380 -a \"${REDIS_PASSWORD}\" ping | grep -q PONG"
            initialDelaySeconds: 10
            periodSeconds: 10
            timeoutSeconds: 5
            failureThreshold: 5
          readinessProbe:
            exec:
              command:
                - sh
                - -c
                - "redis-cli -h 127.0.0.1 -p 6380 -a \"${REDIS_PASSWORD}\" ping | grep -q PONG"
            initialDelaySeconds: 5
            periodSeconds: 5
            timeoutSeconds: 3
            failureThreshold: 3
          resources:
            requests:
              memory: "256Mi"
              cpu: "250m"
            limits:
              memory: "512Mi"
              cpu: "1000m"
  # 使用 volumeClaimTemplates 让 StatefulSet 自动创建 PVC
  volumeClaimTemplates:
    - metadata:
        name: redis-data
      spec:
        storageClassName: longhorn
        accessModes: ["ReadWriteOnce"]
        resources:
          requests:
            storage: 5Gi
