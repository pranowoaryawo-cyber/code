apiVersion: v1
kind: PersistentVolumeClaim
metadata:
  name: app-storage-pvc
  namespace: dify-plus
  labels:
    app.kubernetes.io/name: app-storage
    app.kubernetes.io/component: shared-storage
    app.kubernetes.io/part-of: dify-plus
spec:
  storageClassName: cephfs-storageclass
  accessModes:
    - ReadWriteMany
  resources:
    requests:
      storage: 50Gi
---
apiVersion: v1
kind: PersistentVolumeClaim
metadata:
  name: sandbox-dependencies-pvc
  namespace: dify-plus
  labels:
    app.kubernetes.io/name: sandbox-dependencies
    app.kubernetes.io/component: sandbox-storage
    app.kubernetes.io/part-of: dify-plus
spec:
  storageClassName: cephfs-storageclass
  accessModes:
    - ReadWriteMany
  resources:
    requests:
      storage: 10Gi
---
apiVersion: v1
kind: PersistentVolumeClaim
metadata:
  name: weaviate-data-pvc
  namespace: dify-plus
spec:
  accessModes:
    - ReadWriteOnce
  resources:
    requests:
      storage: 10Gi
