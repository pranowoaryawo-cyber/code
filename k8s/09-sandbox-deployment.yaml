apiVersion: apps/v1
kind: Deployment
metadata:
  name: sandbox
  namespace: dify-plus
  labels:
    app.kubernetes.io/name: sandbox
    app.kubernetes.io/component: sandbox
    app.kubernetes.io/part-of: dify-plus
spec:
  replicas: 1
  strategy:
    type: Recreate
  selector:
    matchLabels:
      app.kubernetes.io/name: sandbox
      app.kubernetes.io/component: sandbox
  template:
    metadata:
      labels:
        app.kubernetes.io/name: sandbox
        app.kubernetes.io/component: sandbox
        app.kubernetes.io/part-of: dify-plus
    spec:
      containers:
        - name: sandbox
          image: harbor.hkbluelans.com/dify/dify-sandbox:0.2.12
          imagePullPolicy: IfNotPresent
          ports:
            - name: http
              containerPort: 8194
              protocol: TCP
          envFrom:
            - configMapRef:
                name: dify-plus-sandbox-config
          env:
            - name: API_KEY
              valueFrom:
                secretKeyRef:
                  name: dify-plus-secrets
                  key: SANDBOX_API_KEY
          volumeMounts:
            - name: sandbox-dependencies
              mountPath: /dependencies
            - name: sandbox-config
              mountPath: /conf/config.yaml
              subPath: config.yaml
          livenessProbe:
            httpGet:
              path: /health
              port: 8194
            initialDelaySeconds: 10
            periodSeconds: 10
            timeoutSeconds: 5
            failureThreshold: 6
          readinessProbe:
            httpGet:
              path: /health
              port: 8194
            initialDelaySeconds: 5
            periodSeconds: 5
            timeoutSeconds: 3
            failureThreshold: 3
          resources:
            requests:
              memory: "128Mi"
              cpu: "100m"
            limits:
              memory: "512Mi"
              cpu: "500m"
      volumes:
        - name: sandbox-dependencies
          persistentVolumeClaim:
            claimName: sandbox-dependencies-pvc
        - name: sandbox-config
          configMap:
            name: sandbox-config-file
