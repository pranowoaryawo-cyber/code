apiVersion: apps/v1
kind: StatefulSet
metadata:
  name: weaviate
  namespace: dify-plus
  labels:
    app.kubernetes.io/name: weaviate
    app.kubernetes.io/component: vector-database
    app.kubernetes.io/part-of: dify-plus
spec:
  serviceName: weaviate
  replicas: 1
  selector:
    matchLabels:
      app.kubernetes.io/name: weaviate
      app.kubernetes.io/component: vector-database
  template:
    metadata:
      labels:
        app.kubernetes.io/name: weaviate
        app.kubernetes.io/component: vector-database
        app.kubernetes.io/part-of: dify-plus
    spec:
      containers:
        - name: weaviate
          image: harbor.hkbluelans.com/dify/semitechnologies-weaviate:1.19.0
          imagePullPolicy: IfNotPresent
          ports:
            - name: http
              containerPort: 8080
              protocol: TCP
            - name: grpc
              containerPort: 50051
              protocol: TCP
          envFrom:
            - configMapRef:
                name: dify-plus-weaviate-config
          volumeMounts:
            - name: weaviate-data
              mountPath: /var/lib/weaviate
          livenessProbe:
            httpGet:
              path: /v1/.well-known/ready
              port: 8080
            initialDelaySeconds: 30
            periodSeconds: 10
            timeoutSeconds: 5
            failureThreshold: 6
          readinessProbe:
            httpGet:
              path: /v1/.well-known/ready
              port: 8080
            initialDelaySeconds: 10
            periodSeconds: 5
            timeoutSeconds: 3
            failureThreshold: 3
          resources:
            requests:
              memory: "512Mi"
              cpu: "500m"
            limits:
              memory: "2Gi"
              cpu: "2000m"
  # 使用 volumeClaimTemplates 让 StatefulSet 自动创建 PVC
  volumeClaimTemplates:
    - metadata:
        name: weaviate-data
      spec:
        storageClassName: longhorn
        accessModes: ["ReadWriteOnce"]
        resources:
          requests:
            storage: 10Gi
