apiVersion: apps/v1
kind: Deployment
metadata:
  name: api
  namespace: dify-plus
  labels:
    app.kubernetes.io/name: api
    app.kubernetes.io/component: backend
    app.kubernetes.io/part-of: dify-plus
spec:
  replicas: 2
  strategy:
    type: RollingUpdate
    rollingUpdate:
      maxSurge: 1
      maxUnavailable: 0
  selector:
    matchLabels:
      app.kubernetes.io/name: api
      app.kubernetes.io/component: backend
  template:
    metadata:
      labels:
        app.kubernetes.io/name: api
        app.kubernetes.io/component: backend
        app.kubernetes.io/part-of: dify-plus
    spec:
      initContainers:
        - name: init-permissions
          image: harbor.hkbluelans.com/test/busybox:1.28
          command:
            - sh
            - -c
            - |
              FLAG_FILE="/app/api/storage/.init_permissions"
              if [ -f "${FLAG_FILE}" ]; then
                echo "Permissions already initialized. Exiting."
                exit 0
              fi
              echo "Initializing permissions for /app/api/storage"
              chown -R 1001:1001 /app/api/storage && touch "${FLAG_FILE}"
              echo "Permissions initialized. Exiting."
          volumeMounts:
            - name: app-storage
              mountPath: /app/api/storage
          securityContext:
            runAsUser: 0
      containers:
        - name: api
          image: harbor.hkbluelans.com/dify/dify-plus-api:1.11.4
          imagePullPolicy: IfNotPresent
          ports:
            - name: http
              containerPort: 5001
              protocol: TCP
          envFrom:
            - configMapRef:
                name: dify-plus-common-config
            - configMapRef:
                name: dify-plus-api-config
          env:
            - name: SECRET_KEY
              valueFrom:
                secretKeyRef:
                  name: dify-plus-secrets
                  key: SECRET_KEY
            - name: INIT_PASSWORD
              valueFrom:
                secretKeyRef:
                  name: dify-plus-secrets
                  key: INIT_PASSWORD
            - name: DB_PASSWORD
              valueFrom:
                secretKeyRef:
                  name: dify-plus-secrets
                  key: DB_PASSWORD
            - name: REDIS_PASSWORD
              valueFrom:
                secretKeyRef:
                  name: dify-plus-secrets
                  key: REDIS_PASSWORD
            - name: CELERY_BROKER_URL
              valueFrom:
                secretKeyRef:
                  name: dify-plus-secrets
                  key: CELERY_BROKER_URL
            - name: WEAVIATE_API_KEY
              valueFrom:
                secretKeyRef:
                  name: dify-plus-secrets
                  key: WEAVIATE_API_KEY
            - name: CODE_EXECUTION_API_KEY
              valueFrom:
                secretKeyRef:
                  name: dify-plus-secrets
                  key: SANDBOX_API_KEY
            - name: PLUGIN_DAEMON_KEY
              valueFrom:
                secretKeyRef:
                  name: dify-plus-secrets
                  key: PLUGIN_DAEMON_KEY
            - name: INNER_API_KEY_FOR_PLUGIN
              valueFrom:
                secretKeyRef:
                  name: dify-plus-secrets
                  key: INNER_API_KEY_FOR_PLUGIN
            - name: FULL_CODE_EXECUTION_ENDPOINT
              value: "http://sandbox-full:8194"
          volumeMounts:
            - name: app-storage
              mountPath: /app/api/storage
          livenessProbe:
            httpGet:
              path: /health
              port: 5001
            initialDelaySeconds: 120
            periodSeconds: 20
            timeoutSeconds: 10
            failureThreshold: 6
          readinessProbe:
            httpGet:
              path: /health
              port: 5001
            initialDelaySeconds: 120
            periodSeconds: 20
            timeoutSeconds: 10
            failureThreshold: 6
          resources:
            requests:
              memory: "1Gi"
              cpu: "1000m"
            limits:
              memory: "2Gi"
              cpu: "2000m"
      volumes:
        - name: app-storage
          persistentVolumeClaim:
            claimName: app-storage-pvc
      affinity:
        podAntiAffinity:
          preferredDuringSchedulingIgnoredDuringExecution:
            - weight: 100
              podAffinityTerm:
                labelSelector:
                  matchExpressions:
                    - key: app.kubernetes.io/name
                      operator: In
                      values:
                        - api
                topologyKey: kubernetes.io/hostname
