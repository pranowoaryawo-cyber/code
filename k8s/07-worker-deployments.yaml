apiVersion: apps/v1
kind: Deployment
metadata:
  name: worker
  namespace: dify-plus
  labels:
    app.kubernetes.io/name: worker
    app.kubernetes.io/component: worker
    app.kubernetes.io/part-of: dify-plus
spec:
  replicas: 2
  strategy:
    type: RollingUpdate
    rollingUpdate:
      maxSurge: 1
      maxUnavailable: 0
  selector:
    matchLabels:
      app.kubernetes.io/name: worker
      app.kubernetes.io/component: worker
  template:
    metadata:
      labels:
        app.kubernetes.io/name: worker
        app.kubernetes.io/component: worker
        app.kubernetes.io/part-of: dify-plus
    spec:
      initContainers:
        - name: init-permissions
          image: harbor.hkbluelans.com/dify/busybox:latest
          command:
            - sh
            - -c
            - |
              FLAG_FILE="/app/api/storage/.init_permissions"
              if [ -f "${FLAG_FILE}" ]; then
                echo "Permissions already initialized. Exiting."
                exit 0
              fi
              echo "Initializing permissions for /app/api/storage"
              chown -R 1001:1001 /app/api/storage && touch "${FLAG_FILE}"
              echo "Permissions initialized. Exiting."
          volumeMounts:
            - name: app-storage
              mountPath: /app/api/storage
          securityContext:
            runAsUser: 0
      containers:
        - name: worker
          image: harbor.hkbluelans.com/dify/dify-plus-api:1.11.4
          imagePullPolicy: IfNotPresent
          envFrom:
            - configMapRef:
                name: dify-plus-common-config
            - configMapRef:
                name: dify-plus-worker-config
          env:
            - name: SECRET_KEY
              valueFrom:
                secretKeyRef:
                  name: dify-plus-secrets
                  key: SECRET_KEY
            - name: DB_PASSWORD
              valueFrom:
                secretKeyRef:
                  name: dify-plus-secrets
                  key: DB_PASSWORD
            - name: REDIS_PASSWORD
              valueFrom:
                secretKeyRef:
                  name: dify-plus-secrets
                  key: REDIS_PASSWORD
            - name: CELERY_BROKER_URL
              valueFrom:
                secretKeyRef:
                  name: dify-plus-secrets
                  key: CELERY_BROKER_URL
            - name: WEAVIATE_API_KEY
              valueFrom:
                secretKeyRef:
                  name: dify-plus-secrets
                  key: WEAVIATE_API_KEY
            - name: INNER_API_KEY_FOR_PLUGIN
              valueFrom:
                secretKeyRef:
                  name: dify-plus-secrets
                  key: INNER_API_KEY_FOR_PLUGIN
          volumeMounts:
            - name: app-storage
              mountPath: /app/api/storage
          resources:
            requests:
              memory: "512Mi"
              cpu: "500m"
            limits:
              memory: "2Gi"
              cpu: "2000m"
      volumes:
        - name: app-storage
          persistentVolumeClaim:
            claimName: app-storage-pvc
---
